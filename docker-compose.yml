services:
  # Reverse proxy (optional for production, can be removed for local dev)
  traefik:
    image: traefik:v2.11
    container_name: lumen-traefik
    profiles:
      - production
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.email=admin@example.com"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
      - "8081:8080"  # Traefik dashboard
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "traefik-letsencrypt:/letsencrypt"
    restart: unless-stopped
    networks:
      - lumen-network

  # Lumen Backend Server (Go)
  server:
    build:
      context: ./app/lumen-server
      dockerfile: Dockerfile
    container_name: lumen-server
    ports:
      - "8080:8080"
    environment:
      - CLICKHOUSE_HOST=clickhouse
      - CLICKHOUSE_PORT=9000
      - CLICKHOUSE_DB=default
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=
      - INGEST_TOKEN=${INGEST_TOKEN:-your-secret-token-here}
      - HTTP_PORT=8080
      - BUFFER_SIZE=1000
      - FLUSH_INTERVAL=1
      - DEFAULT_PRICE_PER_1K=5.0
      - DEFAULT_PAY_THROUGH=0.5
    depends_on:
      clickhouse:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - lumen-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.server.rule=Host(`api.lumen.example.com`)"
      - "traefik.http.routers.server.entrypoints=websecure"
      - "traefik.http.routers.server.tls.certresolver=letsencrypt"
      - "traefik.http.services.server.loadbalancer.server.port=8080"
      - "traefik.http.routers.server-http.rule=Host(`api.lumen.example.com`)"
      - "traefik.http.routers.server-http.entrypoints=web"
      - "traefik.http.routers.server-http.middlewares=redirect-to-https"

  # Lumen Dashboard (Next.js)
  dashboard:
    build:
      context: ./app/lumen-dashboard
      dockerfile: Dockerfile
    container_name: lumen-dashboard
    ports:
      - "3000:3000"
    environment:
      - API_URL=http://server:8080/v1
      - API_KEY=${INGEST_TOKEN:-your-secret-token-here}
    depends_on:
      - server
    restart: unless-stopped
    networks:
      - lumen-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=Host(`lumen.example.com`)"
      - "traefik.http.routers.dashboard.entrypoints=websecure"
      - "traefik.http.routers.dashboard.tls.certresolver=letsencrypt"
      - "traefik.http.services.dashboard.loadbalancer.server.port=3000"
      - "traefik.http.routers.dashboard-http.rule=Host(`lumen.example.com`)"
      - "traefik.http.routers.dashboard-http.entrypoints=web"
      - "traefik.http.routers.dashboard-http.middlewares=redirect-to-https"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"

  # ClickHouse Database
  clickhouse:
    image: clickhouse/clickhouse-server:24.1
    container_name: lumen-clickhouse
    ports:
      - "8123:8123"  # HTTP interface
      - "9000:9000"  # Native protocol
    environment:
      - CLICKHOUSE_DB=default
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - clickhouse-logs:/var/log/clickhouse-server
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    networks:
      - lumen-network

volumes:
  clickhouse-data:
    driver: local
  clickhouse-logs:
    driver: local
  traefik-letsencrypt:
    driver: local

networks:
  lumen-network:
    driver: bridge
